services:
  mongil-web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: mongil-web
    restart: unless-stopped
    expose: ["3000"]
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
    networks:
      - side-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mongil-api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: mongil-api
    restart: unless-stopped
    expose: ["3001"]
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3001"
      FRONTEND_URL: https://mongil.peo.kr
    networks:
      - side-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Phase 1: 크롤러 워커 (pg-boss + Playwright)
