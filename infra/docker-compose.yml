services:
  mongil-web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: mongil-web
    restart: unless-stopped
    expose: ["3000"]
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
    networks:
      - side-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

