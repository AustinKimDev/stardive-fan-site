  #     DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
  #   networks:
  #     - side-network

networks:
  # yohan-server-infra의 Caddy가 관리하는 외부 네트워크
  side-network:
    external: true
    name: side-project-network
